<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>膠片剩餘量計算系統 | Hệ thống tính toán màng</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --main-bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card-bg: rgba(255, 255, 255, 0.05);
      --input-focus: #38bdf8;
      --weight-neon: #2dd4bf;
      --length-neon: #a855f7;
      --text-gold: #fbbf24;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--main-bg);
      color: #f8fafc;
      margin: 0;
      padding: 20px 10px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    /* 響應式容器 */
    .app-container {
      width: 100%;
      max-width: 900px; /* PC端展開寬度 */
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 頂部標題 */
    header {
      text-align: center;
      padding: 10px 0;
    }
    h1 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      margin: 0;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    /* 語言切換 */
    .lang-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 10px 0;
    }
    .lang-btn {
      padding: 8px 24px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #94a3b8;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }
    .lang-btn.active {
      background: #38bdf8;
      color: #0f172a;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
    }

    /* 主布局區域 */
    .grid-layout {
      display: grid;
      grid-template-columns: 1fr; /* 手機預設一欄 */
      gap: 20px;
    }

    @media (min-width: 768px) {
      .grid-layout {
        grid-template-columns: 1fr 1fr; /* PC端雙欄 */
      }
    }

    /* 卡片通用樣式 */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    /* 輸入區 */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      color: var(--text-gold);
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .input-wrap { position: relative; }
    .input-wrap input, .input-wrap select {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      transition: 0.3s;
    }
    .input-wrap input:focus {
      outline: none;
      border-color: var(--input-focus);
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
    }
    .input-wrap .unit {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 14px;
    }

    /* 結果區 */
    .result-stack {
      display: flex;
      flex-direction: column;
      gap: 15px;
      justify-content: center;
    }
    .res-box {
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .res-box::before {
      content: ""; position: absolute; top:0; left:0; width: 4px; height: 100%;
    }
    .res-box.weight { background: rgba(45, 212, 191, 0.1); }
    .res-box.weight::before { background: var(--weight-neon); }
    .res-box.length { background: rgba(168, 85, 247, 0.1); }
    .res-box.length::before { background: var(--length-neon); }

    .res-label { font-size: 14px; color: #94a3b8; margin-bottom: 5px; display: block; }
    .res-val { 
      font-family: 'Orbitron', sans-serif;
      font-size: 42px; 
      font-weight: 700; 
      display: block;
    }
    .weight .res-val { color: var(--weight-neon); text-shadow: 0 0 10px rgba(45, 212, 191, 0.3); }
    .length .res-val { color: var(--length-neon); text-shadow: 0 0 10px rgba(168, 85, 247, 0.3); }

    /* 頁尾 */
    footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    [data-lang="vi"] .lang-zh { display: none; }
    [data-lang="zh"] .lang-vi { display: none; }
  </style>
</head>
<body data-lang="zh">

<div class="app-container">
  <header>
    <h1 class="lang-zh">膠片剩餘量盤點系統</h1>
    <h1 class="lang-vi">Hệ Thống Tính Toán Màng Phim</h1>
    <div class="lang-bar">
      <button id="btn-zh" class="lang-btn active" onclick="switchLang('zh')">TW</button>
      <button id="btn-vi" class="lang-btn" onclick="switchLang('vi')">VN</button>
    </div>
  </header>

  <main class="grid-layout">
    <section class="card">
      <div class="field">
        <label class="lang-zh">單邊卷厚 (r)</label>
        <label class="lang-vi">Độ dày cuộn một bên (r)</label>
        <div class="input-wrap">
          <input type="number" id="in-r" placeholder="0.0" oninput="doCalc()">
          <span class="unit">mm</span>
        </div>
      </div>

      <div class="field">
        <label class="lang-zh">膠片寬度 (w)</label>
        <label class="lang-vi">Chiều rộng màng (w)</label>
        <div class="input-wrap">
          <input type="number" id="in-w" placeholder="0.0" oninput="doCalc()">
          <span class="unit">mm</span>
        </div>
      </div>

      <div class="field">
        <label class="lang-zh">單層厚度 (t)</label>
        <label class="lang-vi">Độ dày màng đơn (t)</label>
        <div class="input-wrap">
          <input type="number" id="in-t" placeholder="0.000" oninput="doCalc()">
          <span class="unit">mm</span>
        </div>
      </div>

      <div class="field">
        <label class="lang-zh">材質密度 (ρ)</label>
        <label class="lang-vi">Tỷ trọng chất liệu (ρ)</label>
        <div class="input-wrap">
          <select id="in-den" onchange="doCalc()">
            <option value="1.34">PET (1.34)</option>
            <option value="0.91">PP (0.91)</option>
            <option value="1.05">PS (1.05)</option>
            <option value="1.38">PVC (1.38)</option>
          </select>
        </div>
      </div>
    </section>

    <section class="result-stack">
      <div class="res-box weight">
        <span class="res-label lang-zh">預估計算重量</span>
        <span class="res-label lang-vi">Khối lượng dự kiến</span>
        <span id="out-wt" class="res-val">0.00</span>
        <span style="color:#94a3b8">KILOGRAMS</span>
      </div>

      <div class="res-box length">
        <span class="res-label lang-zh">預估計算長度</span>
        <span class="res-label lang-vi">Chiều dài dự kiến</span>
        <span id="out-ln" class="res-val">0.00</span>
        <span style="color:#94a3b8">METERS</span>
      </div>
    </section>
  </main>

  <footer>
    <div class="lang-zh">參數設定：芯管外徑 168mm | 本系統僅供盤點參考</div>
    <div class="lang-vi">Thông số: Lõi 168mm | Hệ thống chỉ mang tính tham khảo</div>
  </footer>
</div>

<script>
  function switchLang(lang) {
    document.body.setAttribute('data-lang', lang);
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + lang).classList.add('active');
  }

  function doCalc() {
    const r = parseFloat(document.getElementById('in-r').value) || 0;
    const w = parseFloat(document.getElementById('in-w').value) || 0;
    const t = parseFloat(document.getElementById('in-t').value) || 0;
    const rho = parseFloat(document.getElementById('in-den').value) || 0;
    const coreD = 168;

    if (r > 0 && w > 0 && rho > 0) {
      const outerD = coreD + (r * 2);
      // V = Area * Width
      const vol = (Math.PI * (Math.pow(outerD, 2) - Math.pow(coreD, 2)) / 4) * w;
      // Wt = V * rho / 10^6
      const weight = (vol * rho) / 1000000;
      document.getElementById('out-wt').innerText = weight.toFixed(2);

      if (t > 0) {
        const length = weight / (w * t * rho / 1000);
        document.getElementById('out-ln').innerText = length.toFixed(2);
      } else {
        document.getElementById('out-ln').innerText = "0.00";
      }
    } else {
      document.getElementById('out-wt').innerText = "0.00";
      document.getElementById('out-ln').innerText = "0.00";
    }
  }
</script>

</body>
</html>
