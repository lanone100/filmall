<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>膠片剩餘量計算表</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-white: #ffffff;
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --text-main: #0f172a;
      --text-sub: #64748b;
      --input-field: #f1f5f9;
      --radius: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 20px 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      color: var(--text-main);
    }

    .container {
      width: 100%;
      max-width: 850px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 頂部切換與標題 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 5px;
    }

    .lang-switcher {
      display: flex;
      background: #e2e8f0;
      padding: 4px;
      border-radius: 12px;
    }

    .lang-btn {
      border: none;
      padding: 8px 18px;
      border-radius: 9px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
      color: var(--text-sub);
    }

    .lang-btn.active {
      background: #fff;
      color: var(--accent-blue);
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    /* 響應式佈局 */
    .grid-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 768px) {
      .grid-layout { grid-template-columns: 1.2fr 1fr; }
    }

    /* 卡片設計 */
    .card {
      background: var(--card-white);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.05);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 25px 0;
      color: var(--text-main);
      display: flex;
      align-items: center;
    }

    h1::before {
      content: "";
      width: 5px;
      height: 22px;
      background: var(--accent-blue);
      margin-right: 12px;
      border-radius: 4px;
    }

    /* 表單區塊 */
    .form-item { margin-bottom: 20px; }
    .form-item label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-sub);
      margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap input, .input-wrap select {
      width: 100%;
      padding: 14px 18px;
      background: var(--input-field);
      border: 2px solid transparent;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      transition: 0.3s;
      outline: none;
    }
    .input-wrap input:focus {
      border-color: var(--accent-blue);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    .unit {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #94a3b8;
      font-weight: 700;
      pointer-events: none;
    }

    /* 結果面板 */
    .result-panel {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .res-box {
      padding: 25px;
      border-radius: var(--radius);
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .res-box.blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .res-box.green { background: linear-gradient(135deg, #10b981, #059669); }

    .res-label { font-size: 13px; font-weight: 700; opacity: 0.85; margin-bottom: 8px; display: block; }
    .res-val { 
      font-family: 'Montserrat', sans-serif;
      font-size: 40px; 
      font-weight: 800; 
      display: block;
    }
    .res-unit { font-size: 15px; font-weight: 500; opacity: 0.9; }

    .setting-info {
      background: #fff7ed;
      border: 1px solid #ffedd5;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      font-size: 13px;
      color: #9a3412;
      font-weight: 700;
    }

    footer {
      text-align: center;
      padding: 20px 0;
      font-size: 12px;
      color: var(--text-sub);
      border-top: 1px solid #e2e8f0;
      line-height: 1.8;
    }

    [data-lang="vi"] .lang-zh { display: none; }
    [data-lang="zh"] .lang-vi { display: none; }
  </style>
</head>
<body data-lang="zh">

<div class="container">
  <header class="header">
    <div style="font-weight: 700; color: #94a3b8; font-size: 0.9rem;">TOOLS</div>
    <div class="lang-switcher">
      <button id="btn-zh" class="lang-btn active" onclick="changeLang('zh')">繁體中文</button>
      <button id="btn-vi" class="lang-btn" onclick="changeLang('vi')">Tiếng Việt</button>
    </div>
  </header>

  <div class="grid-layout">
    <section class="card">
      <h1 class="lang-zh">膠片剩餘量計算表</h1>
      <h1 class="lang-vi">Bảng tính màng phim</h1>

      <div class="form-item">
        <label class="lang-zh">單邊皮厚 (r)</label>
        <label class="lang-vi">Độ dày một bên (r)</label>
        <div class="input-wrap">
          <input type="number" id="v-r" placeholder="0.0" oninput="run()">
          <span class="unit">mm</span>
        </div>
      </div>

      <div class="form-item">
        <label class="lang-zh">膠片寬度 (w)</label>
        <label class="lang-vi">Chiều rộng màng (w)</label>
        <div class="input-wrap">
          <input type="number" id="v-w" placeholder="0.0" oninput="run()">
          <span class="unit">mm</span>
        </div>
      </div>

      <div class="form-item">
        <label class="lang-zh">單層厚度 (t)</label>
        <label class="lang-vi">Độ dày đơn (t)</label>
        <div class="input-wrap">
          <input type="number" id="v-t" placeholder="0.000" oninput="run()">
          <span class="unit">mm</span>
        </div>
      </div>

      <div class="form-item">
        <label class="lang-zh">材質密度 (ρ)</label>
        <label class="lang-vi">Tỷ trọng chất liệu (ρ)</label>
        <div class="input-wrap">
          <select id="v-den" onchange="run()">
            <option value="1.34">PET (1.34)</option>
            <option value="0.91">PP (0.91)</option>
            <option value="1.05">PS (1.05)</option>
            <option value="1.38">PVC (1.38)</option>
          </select>
        </div>
      </div>
    </section>

    <section class="result-panel">
      <div class="res-box blue">
        <span class="res-label lang-zh">計算重量結果</span>
        <span class="res-label lang-vi">Khối lượng tính toán</span>
        <span id="o-wt" class="res-val">0.00</span>
        <span class="res-unit">Kilogram (kg)</span>
      </div>

      <div class="res-box green">
        <span class="res-label lang-zh">預估長度結果</span>
        <span class="res-label lang-vi">Chiều dài tính toán</span>
        <span id="o-ln" class="res-val">0.00</span>
        <span class="res-unit">Meter (m)</span>
      </div>

      <div class="setting-info">
        <span class="lang-zh">⚙️ 芯管外徑設定為：168mm</span>
        <span class="lang-vi">⚙️ Đường kính lõi: 168mm</span>
      </div>
    </section>
  </div>

  <footer>
    <div class="lang-zh">本工具僅供參考使用，數據與實際情況可能有些許誤差。</div>
    <div class="lang-vi">Kết quả chỉ mang tính tham khảo, dữ liệu có thể chênh lệch thực tế.</div>
  </footer>
</div>

<script>
  function changeLang(l) {
    document.body.setAttribute('data-lang', l);
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + l).classList.add('active');
  }

  function run() {
    const r = parseFloat(document.getElementById('v-r').value) || 0;
    const w = parseFloat(document.getElementById('v-w').value) || 0;
    const t = parseFloat(document.getElementById('v-t').value) || 0;
    const den = parseFloat(document.getElementById('v-den').value) || 0;
    const core = 168;

    if (r > 0 && w > 0 && den > 0) {
      const outerD = core + (r * 2);
      const volume = (Math.PI * (Math.pow(outerD, 2) - Math.pow(core, 2)) / 4) * w;
      const weight = (volume * den) / 1000000;
      document.getElementById('o-wt').innerText = weight.toFixed(2);

      if (t > 0) {
        const length = weight / (w * t * den / 1000);
        document.getElementById('o-ln').innerText = length.toFixed(2);
      } else {
        document.getElementById('o-ln').innerText = "0.00";
      }
    } else {
      document.getElementById('o-wt').innerText = "0.00";
      document.getElementById('o-ln').innerText = "0.00";
    }
  }
</script>

</body>
</html>
