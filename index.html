<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>膠片剩餘量計算表</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb; /* 更加鮮明的深藍 */
      --success: #059669;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-bold: #0f172a;
      --text-main: #334155;
      --text-muted: #64748b;
      --border: #d1d5db;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 16px;
      line-height: 1.6;
    }

    /* 頂部切換按鈕 */
    .lang-switcher {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .lang-btn {
      flex: 1;
      max-width: 120px;
      padding: 8px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--card-bg);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    .lang-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* 主卡片設計 */
    .calc-card {
      width: 100%;
      max-width: 450px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      padding: 24px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-bold);
      text-align: center;
      margin: 0 0 8px 0;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    /* 輸入區塊 */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-bold);
      margin-bottom: 6px;
    }
    .field .vi-label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      margin-top: -2px;
      margin-bottom: 6px;
    }
    .input-wrap { position: relative; }
    .input-wrap input, .input-wrap select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 18px; /* 加大字體方便輸入 */
      color: var(--text-bold);
      background: white;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }
    .input-wrap input:focus { border-color: var(--primary); }
    .input-wrap .unit {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-weight: 700;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* 計算結果區域 */
    .res-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 28px;
    }
    .res-box {
      background: #f1f5f9;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #e2e8f0;
    }
    .res-box.main { border: 2px solid var(--primary); background: #eff6ff; }
    .res-box.alt { border: 2px solid var(--success); background: #f0fdf4; }
    
    .res-name { font-size: 13px; font-weight: 700; color: var(--text-muted); display: block; }
    .res-val { font-size: 26px; font-weight: 700; color: var(--text-bold); display: block; margin: 4px 0; }
    .res-unit { font-size: 13px; font-weight: 700; color: var(--text-muted); }

    .formula-note {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 20px;
      text-align: center;
      border-top: 1px solid #e5e7eb;
      padding-top: 12px;
    }
  </style>
</head>
<body>

  <div class="lang-switcher">
    <button class="lang-btn active" id="btn-zh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" id="btn-vi" onclick="setLang('vi')">Tiếng Việt</button>
  </div>

  <div class="calc-card">
    <h1 id="t-title">膠片剩餘量計算表</h1>
    <div class="subtitle" id="t-sub">輸入規格即時計算重量與長度</div>

    <div class="field">
      <label id="l-r">剩餘半徑厚度 (r)</label>
      <span class="vi-label">Độ dày bán kính còn lại</span>
      <div class="input-wrap">
        <input type="number" id="v-r" placeholder="0.00" oninput="calc()">
        <span class="unit">mm</span>
      </div>
    </div>

    <div class="field">
      <label id="l-w">膠片寬度 (w)</label>
      <span class="vi-label">Chiều rộng màng film</span>
      <div class="input-wrap">
        <input type="number" id="v-w" placeholder="0.00" oninput="calc()">
        <span class="unit">mm</span>
      </div>
    </div>

    <div class="field">
      <label id="l-t">膠片厚度 (t)</label>
      <span class="vi-label">Độ dày của tấm phim</span>
      <div class="input-wrap">
        <input type="number" id="v-t" placeholder="0.000" oninput="calc()">
        <span class="unit">mm</span>
      </div>
    </div>

    <div class="field">
      <label id="l-m">材質密度 (ρ)</label>
      <span class="vi-label">Tỷ trọng chất liệu</span>
      <div class="input-wrap">
        <select id="v-den" onchange="calc()">
          <option value="1.34">PET (1.34)</option>
          <option value="0.91">PP (0.91)</option>
          <option value="1.05">PS (1.05)</option>
          <option value="1.38">PVC (1.38)</option>
        </select>
      </div>
    </div>

    <div class="res-group">
      <div class="res-box main">
        <span class="res-name" id="t-res-w">計算重量 / Khối lượng</span>
        <span class="res-val" id="out-wt">0.00</span>
        <span class="res-unit">kg</span>
      </div>
      <div class="res-box alt">
        <span class="res-name" id="t-res-l">計算長度 / Chiều dài</span>
        <span class="res-val" id="out-ln">0.00</span>
        <span class="res-unit">m</span>
      </div>
    </div>

    <div class="formula-note">
      芯管外徑 Core OD: 168mm | Weight = [π×((2r+168)²/4-168²/4)]×w×ρ/10⁶
    </div>
  </div>

  <script>
    const i18n = {
      zh: {
        title: "膠片剩餘量計算表",
        sub: "輸入規格即時計算重量與長度",
        res_w: "計算重量",
        res_l: "計算長度"
      },
      vi: {
        title: "Bảng tính lượng phim còn lại",
        sub: "Nhập quy cách để tính khối lượng và chiều dài",
        res_w: "Khối lượng tính",
        res_l: "Chiều dài tính"
      }
    };

    function setLang(lang) {
      document.getElementById('t-title').innerText = i18n[lang].title;
      document.getElementById('t-sub').innerText = i18n[lang].sub;
      document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
      document.getElementById('btn-vi').classList.toggle('active', lang === 'vi');
    }

    function calc() {
      const r = parseFloat(document.getElementById('v-r').value) || 0;
      const w = parseFloat(document.getElementById('v-w').value) || 0;
      const t = parseFloat(document.getElementById('v-t').value) || 0;
      const d = parseFloat(document.getElementById('v-den').value) || 0;

      if (r > 0 && w > 0 && d > 0) {
        // Core diameter = 168mm
        const weight = (Math.PI * (Math.pow(r * 2 + 168, 2) / 4) - Math.PI * (Math.pow(168, 2) / 4)) * w * d / 1000000;
        document.getElementById('out-wt').innerText = weight.toFixed(2);
        
        if (t > 0) {
          const length = weight / (w * t * d / 1000);
          document.getElementById('out-ln').innerText = length.toFixed(2);
        } else {
          document.getElementById('out-ln').innerText = "0.00";
        }
      } else {
        document.getElementById('out-wt').innerText = "0.00";
        document.getElementById('out-ln').innerText = "0.00";
      }
    }
  </script>
</body>
</html>
