<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>膠片剩餘量計算表</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
      --accent-blue: #4facfe;
      --accent-blue-deep: #00f2fe;
      --accent-green: #43e97b;
      --accent-green-deep: #38f9d7;
      --text-dark: #2c3e50;
      --card-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg-gradient);
      margin: 0;
      padding: 20px 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-dark);
    }

    /* 頂部導航與切換 */
    .top-bar {
      width: 100%;
      max-width: 850px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .lang-switcher {
      display: flex;
      background: rgba(0,0,0,0.05);
      padding: 5px;
      border-radius: 50px;
      backdrop-filter: blur(5px);
    }

    .lang-btn {
      border: none;
      padding: 8px 20px;
      border-radius: 50px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background: transparent;
      color: #7f8c8d;
    }

    .lang-btn.active {
      background: #fff;
      color: var(--accent-blue);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* 主容器佈局 */
    .app-grid {
      width: 100%;
      max-width: 850px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
    }

    @media (min-width: 768px) {
      .app-grid { grid-template-columns: 1.1fr 0.9fr; }
    }

    /* 卡片通用 */
    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 30px;
      padding: 35px 30px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255,255,255,0.7);
    }

    h1 {
      font-size: 26px;
      margin: 0 0 30px 0;
      text-align: center;
      background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    /* 輸入樣式 */
    .field { margin-bottom: 22px; }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #95a5a6;
      margin-bottom: 10px;
      padding-left: 10px;
    }

    .input-group { position: relative; }
    .input-group input, .input-group select {
      width: 100%;
      padding: 16px 20px;
      background: #fdfdfd;
      border: 2px solid #edf2f7;
      border-radius: 18px;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-dark);
      transition: 0.3s;
      outline: none;
    }

    .input-group input:focus {
      border-color: var(--accent-blue);
      background: #fff;
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.15);
    }

    .unit {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: #bdc3c7;
      font-weight: 700;
    }

    /* 結果區設計 */
    .result-stack {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .res-card {
      padding: 30px;
      border-radius: 25px;
      color: white;
      text-align: center;
      transition: transform 0.3s;
    }
    .res-card:hover { transform: translateY(-5px); }

    .res-card.blue {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      box-shadow: 0 15px 30px rgba(79, 172, 254, 0.25);
    }

    .res-card.green {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      box-shadow: 0 15px 30px rgba(67, 233, 123, 0.25);
    }

    .res-label { font-size: 13px; font-weight: 700; opacity: 0.9; margin-bottom: 10px; display: block; }
    .res-val { 
      font-family: 'Montserrat', sans-serif;
      font-size: 50px; 
      font-weight: 900; 
      display: block;
      margin-bottom: 5px;
    }

    .info-footer {
      background: #fffbeb;
      border: 1.5px dashed #fcd34d;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      font-size: 14px;
      color: #d97706;
      font-weight: 700;
    }

    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: #bdc3c7;
      line-height: 2;
    }

    [data-lang="vi"] .lang-zh { display: none; }
    [data-lang="zh"] .lang-vi { display: none; }
  </style>
</head>
<body data-lang="zh">

  <div class="top-bar">
    <div style="font-weight: 900; color: #4facfe; letter-spacing: 1px;">CALCULATOR</div>
    <div class="lang-switcher">
      <button id="btn-zh" class="lang-btn active" onclick="switchLang('zh')">繁中</button>
      <button id="btn-vi" class="lang-btn" onclick="switchLang('vi')">Việt</button>
    </div>
  </div>

  <div class="app-grid">
    <section class="glass-card">
      <h1 class="lang-zh">膠片剩餘量計算表</h1>
      <h1 class="lang-vi">Bảng Tính Lượng Màng Dư</h1>

      <div class="field">
        <label class="lang-zh">單邊卷厚 (r)</label>
        <label class="lang-vi">Độ dày một bên (r)</label>
        <div class="input-group">
          <input type="number" id="r" placeholder="0.0" oninput="doCalc()">
          <span class="unit">mm</span>
        </div>
      </div>

      <div class="field">
        <label class="lang-zh">膠片寬度 (w)</label>
        <label class="lang-vi">Chiều rộng màng (w)</label>
        <div class="input-group">
          <input type="number" id="w" placeholder="0.0" oninput="doCalc()">
          <span class="unit">mm</span>
        </div>
      </div>

      <div class="field">
        <label class="lang-zh">單層厚度 (t)</label>
        <label class="lang-vi">Độ dày màng đơn (t)</label>
        <div class="input-group">
          <input type="number" id="t" placeholder="0.000" oninput="doCalc()">
          <span class="unit">mm</span>
        </div>
      </div>

      <div class="field">
        <label class="lang-zh">材質密度 (ρ)</label>
        <label class="lang-vi">Tỷ trọng chất liệu (ρ)</label>
        <div class="input-group">
          <select id="den" onchange="doCalc()">
            <option value="1.34">PET (1.34)</option>
            <option value="0.91">PP (0.91)</option>
            <option value="1.05">PS (1.05)</option>
            <option value="1.38">PVC (1.38)</option>
          </select>
        </div>
      </div>
    </section>

    <div class="result-stack">
      <div class="res-card blue">
        <span class="res-label lang-zh">計算重量結果</span>
        <span class="res-label lang-vi">Khối lượng tính toán</span>
        <span id="wt" class="res-val">0.00</span>
        <span style="font-size: 18px; font-weight: 700;">KG</span>
      </div>

      <div class="res-card green">
        <span class="res-label lang-zh">預估長度結果</span>
        <span class="res-label lang-vi">Chiều dài tính toán</span>
        <span id="ln" class="res-val">0.00</span>
        <span style="font-size: 18px; font-weight: 700;">METER</span>
      </div>

      <div class="info-footer">
        <span class="lang-zh">⚙️ 芯管外徑已預設：168mm</span>
        <span class="lang-vi">⚙️ Đường kính lõi: 168mm</span>
      </div>
    </div>
  </div>

  <footer>
    <div class="lang-zh">本工具僅供現場參考，實際請以地磅為準。</div>
    <div class="lang-vi">Dữ liệu chỉ mang tính chất tham khảo, vui lòng dựa trên thực tế.</div>
  </footer>

  <script>
    function switchLang(l) {
      document.body.setAttribute('data-lang', l);
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + l).classList.add('active');
    }

    function doCalc() {
      const r = parseFloat(document.getElementById('r').value) || 0;
      const w = parseFloat(document.getElementById('w').value) || 0;
      const t = parseFloat(document.getElementById('t').value) || 0;
      const rho = parseFloat(document.getElementById('den').value) || 0;
      const core = 168;

      if (r > 0 && w > 0 && rho > 0) {
        const outerD = core + (r * 2);
        // Area * Width = Volume (mm3)
        const vol = (Math.PI * (Math.pow(outerD, 2) - Math.pow(core, 2)) / 4) * w;
        // Weight (kg) = V * rho / 10^6
        const weight = (vol * rho) / 1000000;
        document.getElementById('wt').innerText = weight.toFixed(2);

        if (t > 0) {
          // Length = Weight / (Width * Thickness * Density)
          const length = weight / (w * t * rho / 1000);
          document.getElementById('ln').innerText = length.toFixed(2);
        } else {
          document.getElementById('ln').innerText = "0.00";
        }
      } else {
        document.getElementById('wt').innerText = "0.00";
        document.getElementById('ln').innerText = "0.00";
      }
    }
  </script>
</body>
</html>
